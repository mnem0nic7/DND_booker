apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: dnd-booker-worker
  annotations:
    run.googleapis.com/ingress: internal
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "1"
        run.googleapis.com/execution-environment: gen2
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/startup-cpu-boost: "true"
        run.googleapis.com/network-interfaces: '[{"network":"default","subnetwork":"default"}]'
        run.googleapis.com/vpc-access-egress: private-ranges-only
        run.googleapis.com/container-dependencies: '{"worker":["cloudsql-proxy"]}'
    spec:
      containerConcurrency: 10
      timeoutSeconds: 3600
      serviceAccountName: dnd-booker-run@dnd-booker.iam.gserviceaccount.com
      containers:
        - name: cloudsql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:latest
          args:
            - --address=0.0.0.0
            - --port=5432
            - dnd-booker:us-west4:dnd-booker-db
          resources:
            limits:
              cpu: "1"
              memory: 256Mi
          startupProbe:
            tcpSocket:
              port: 5432
            failureThreshold: 30
            periodSeconds: 2
        - name: worker
          image: us-west4-docker.pkg.dev/dnd-booker/dnd-booker/dnd-booker-worker:latest
          ports:
            - containerPort: 8080
          env:
            - name: NODE_ENV
              value: production
            - name: REDIS_HOST
              value: 10.46.177.11
            - name: REDIS_PORT
              value: "6379"
            - name: WORKER_CONCURRENCY
              value: "1"
            - name: WORKER_EXPORT_CONCURRENCY
              value: "2"
            - name: OPS_AUDIT_ENABLED
              value: "true"
            - name: OPS_AUDIT_INTERVAL_MS
              value: "300000"
            - name: OPS_AUDIT_STALE_GENERATION_MINUTES
              value: "15"
            - name: OPS_AUDIT_STALE_AGENT_MINUTES
              value: "15"
            - name: OPS_AUDIT_STALE_EXPORT_MINUTES
              value: "15"
            - name: OPS_AUDIT_PENDING_INTERRUPT_MINUTES
              value: "20"
            - name: SERVER_BASE_URL
              value: __WEB_SERVICE_URL__
            - name: GCS_BUCKET
              value: dnd-booker-prod-assets
            - name: GCS_ASSET_PREFIX
              value: uploads
            - name: GCS_EXPORT_PREFIX
              value: output
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: dnd-booker-database-url
                  key: latest
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dnd-booker-redis-password
                  key: latest
            - name: AI_KEY_ENCRYPTION_SECRET
              valueFrom:
                secretKeyRef:
                  name: dnd-booker-ai-key-encryption-secret
                  key: latest
          resources:
            limits:
              cpu: "2"
              memory: 4Gi
          startupProbe:
            httpGet:
              path: /
              port: 8080
            failureThreshold: 30
            periodSeconds: 2
  traffic:
    - percent: 100
      latestRevision: true
