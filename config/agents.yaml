system:
  defaultProvider: ollama
  defaultBudgetLane: balanced
  credentials:
    googleEnv: SYSTEM_GOOGLE_API_KEY
    openaiEnv: SYSTEM_OPENAI_API_KEY
    anthropicEnv: SYSTEM_ANTHROPIC_API_KEY

lanes:
  fast:
    defaultProvider: ollama
  balanced:
    defaultProvider: ollama
  high_quality:
    defaultProvider: ollama

agents:
