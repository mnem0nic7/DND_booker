services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dnd_booker
      POSTGRES_PASSWORD: dnd_booker_dev
      POSTGRES_DB: dnd_booker
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dnd_booker -d dnd_booker"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

volumes:
  pgdata:
