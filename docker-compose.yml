services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dnd_booker
      POSTGRES_PASSWORD: dnd_booker_dev
      POSTGRES_DB: dnd_booker
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dnd_booker -d dnd_booker"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-dev-redis-password}
    ports:
      - '6380:6379'
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-dev-redis-password}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Port not exposed to host in production — only accessible via nginx proxy
    # Uncomment for local development: ports: ['4000:4000']
    environment:
      - DATABASE_URL=postgresql://dnd_booker:dnd_booker_dev@postgres:5432/dnd_booker
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-dev-redis-password}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set in .env}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET must be set in .env}
      - CLIENT_URL=${CLIENT_URL:-http://localhost:3000}
      - AI_KEY_ENCRYPTION_SECRET=${AI_KEY_ENCRYPTION_SECRET:?AI_KEY_ENCRYPTION_SECRET must be set in .env}
      - NODE_ENV=production
      - PORT=4000
      - OLLAMA_MAX_RESPONSE_TOKENS=${OLLAMA_MAX_RESPONSE_TOKENS:-512}
      - EXPORT_OUTPUT_DIR=/app/worker/output
    volumes:
      - export-output:/app/worker/output
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DATABASE_URL=postgresql://dnd_booker:dnd_booker_dev@postgres:5432/dnd_booker
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-dev-redis-password}
      - SERVER_BASE_URL=http://server:4000
      - AI_KEY_ENCRYPTION_SECRET=${AI_KEY_ENCRYPTION_SECRET:?AI_KEY_ENCRYPTION_SECRET must be set in .env}
      - NODE_ENV=production
    volumes:
      - export-output:/app/worker/output
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    ports:
      - '3000:80'
    depends_on:
      server:
        condition: service_healthy

volumes:
  pgdata:
  export-output:
